<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة Hotspot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-display {
            width: 200px;
            height: 100px;
            margin: 0 auto 15px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .welcome-message {
            text-align: center;
            margin-bottom: 30px;
            color: #ccc;
            line-height: 1.6;
            font-size: 16px;
        }
        
        /* شريط التبديل بين الأنظمة */
        .method-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 25px;
            gap: 5px;
        }
        
        .method-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #ccc;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .method-tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .method-tab.active {
            background: rgba(67, 97, 238, 0.3);
            color: white;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
        }
        
        .method-tab i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        /* أشكال الدخول المختلفة */
        .login-form {
            margin-bottom: 25px;
        }
        
        /* الشكل الأساسي (يوزر/باس) */
        .basic-login {
            display: none;
        }
        
        .basic-login.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        /* شكل الكروت */
        .cards-login {
            display: none;
            text-align: center;
        }
        
        .cards-login.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        /* شكل الباركود */
        .barcode-login {
            display: none;
            text-align: center;
        }
        
        .barcode-login.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #4361ee;
        }
        
        .card-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
        }
        
        .card-icon {
            font-size: 60px;
            color: #f72585;
            margin-bottom: 20px;
        }
        
        .card-instruction {
            color: #aaa;
            margin-bottom: 20px;
        }
        
        .barcode-icon {
            font-size: 80px;
            color: #4cc9f0;
            margin-bottom: 20px;
        }
        
        .barcode-instruction {
            color: #aaa;
            margin-bottom: 20px;
        }
        
        .camera-area {
            width: 100%;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .camera-icon {
            font-size: 50px;
            color: #4cc9f0;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }
        
        .notification {
            background: rgba(76, 201, 240, 0.2);
            border: 1px solid #4cc9f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .notification.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <!-- الشعار -->
        <div class="logo-area">
            <div class="logo-display" id="logoDisplay"></div>
            <div class="logo-text" id="logoText">نقطة الاتصال</div>
        </div>
        
        <!-- رسالة الترحيب -->
        <div class="welcome-message" id="welcomeText">
            مرحبًا بك! يرجى تسجيل الدخول للوصول إلى الإنترنت
        </div>
        
        <!-- الإشعارات -->
        <div class="notification" id="notification"></div>
        
        <!-- شريط التبديل بين الأنظمة (يظهر فقط في النظام المختلط) -->
        <div class="method-tabs" id="methodTabs" style="display: none;">
            <div class="method-tab active" data-method="userpass">
                <i class="fas fa-user-lock"></i>
                يوزر/باس
            </div>
            <div class="method-tab" data-method="cards">
                <i class="fas fa-credit-card"></i>
                الكروت
            </div>
            <div class="method-tab" data-method="barcode">
                <i class="fas fa-barcode"></i>
                باركود
            </div>
        </div>
        
        <!-- أشكال الدخول المختلفة -->
        <div class="login-form">
            <!-- شكل اليوزر/باس -->
            <div class="basic-login" id="basicLogin">
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="اسم المستخدم" id="username">
                </div>
                
                <div class="form-group">
                    <input type="password" class="form-input" placeholder="كلمة المرور" id="password">
                </div>
            </div>
            
            <!-- شكل الكروت -->
            <div class="cards-login" id="cardsLogin">
                <div class="card-icon">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="card-instruction" id="cardInstruction">
                    يرجى إدخال رقم الكارت الخاص بك
                </div>
                <div class="form-group">
                    <input type="text" class="card-input" placeholder="رقم الكارت" id="cardNumber" maxlength="19">
                </div>
            </div>
            
            <!-- شكل الباركود -->
            <div class="barcode-login" id="barcodeLogin">
                <div class="barcode-icon">
                    <i class="fas fa-barcode"></i>
                </div>
                <div class="barcode-instruction" id="barcodeInstruction">
                    قم بمسح الباركود باستخدام الكاميرا
                </div>
                <div class="camera-area">
                    <div class="camera-icon">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="أو أدخل رمز الباركود يدوياً" id="barcodeInput">
                </div>
            </div>
            
            <!-- زر الدخول -->
            <button class="login-btn" id="loginButton">
                <i class="fas fa-sign-in-alt"></i>
                <span id="loginButtonText">تسجيل الدخول</span>
            </button>
        </div>
        
        <!-- التذييل -->
        <div class="footer">
            <p id="footerText">نظام الدخول المتقدم © 2024</p>
        </div>
    </div>

    <script>
        // الإعدادات الحالية
        let currentSettings = {};
        let currentMethod = 'userpass'; // الطريقة الحالية للنظام المختلط
        
        // دالة لتحديث التصميم بناءً على الإعدادات
        function updateDesign(settings) {
            console.log('📥 استلام إعدادات:', settings);
            currentSettings = settings;
            
            if (!settings || !settings.design) {
                console.error('❌ لا توجد إعدادات للتصميم');
                return;
            }
            
            // 1. تحديث الخلفية
            updateBackground(settings.design.background);
            
            // 2. تحديث الشعار
            updateLogo(settings.design.logo);
            
            // 3. تحديث النصوص
            updateTexts(settings.design.texts);
            
            // 4. تحديث نظام الدخول
            updateLoginMethod(settings.login);
            
            showMessage('تم تحديث التصميم', 'success');
        }
        
        // تحديث الخلفية
        function updateBackground(background) {
            if (!background) return;
            
            const body = document.body;
            
            if (background.type === 'color') {
                body.style.background = background.color || '#1a1a2e';
            } else if (background.type === 'gradient') {
                const color1 = background.gradient?.color1 || '#667eea';
                const color2 = background.gradient?.color2 || '#764ba2';
                body.style.background = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
            } else if (background.type === 'image' && background.image) {
                body.style.background = `url('${background.image}') center/cover no-repeat`;
                body.style.backgroundAttachment = 'fixed';
            } else {
                body.style.background = background.color || '#1a1a2e';
            }
        }
        
        // تحديث الشعار
        function updateLogo(logo) {
            if (!logo) return;
            
            const logoDisplay = document.getElementById('logoDisplay');
            const logoText = document.getElementById('logoText');
            
            if (logo.image) {
                logoDisplay.style.background = `url('${logo.image}') center/contain no-repeat`;
                logoDisplay.textContent = '';
                logoText.textContent = '';
            } else if (logo.text) {
                logoDisplay.style.background = `linear-gradient(45deg, ${logo.color || '#4361ee'}, ${darkenColor(logo.color || '#4361ee', 20)})`;
                logoDisplay.textContent = logo.text;
                logoDisplay.style.display = 'flex';
                logoDisplay.style.alignItems = 'center';
                logoDisplay.style.justifyContent = 'center';
                logoDisplay.style.fontSize = getLogoSize(logo.size);
                logoDisplay.style.color = 'white';
                logoDisplay.style.fontWeight = 'bold';
                logoText.textContent = '';
            }
        }
        
        // تحديث النصوص
        function updateTexts(texts) {
            if (!texts) return;
            
            document.getElementById('welcomeText').textContent = texts.welcomeMessage || 'مرحبًا بك!';
            document.getElementById('username').placeholder = texts.usernamePlaceholder || 'اسم المستخدم';
            document.getElementById('password').placeholder = texts.passwordPlaceholder || 'كلمة المرور';
            document.getElementById('loginButtonText').textContent = texts.loginButtonText || 'تسجيل الدخول';
            document.getElementById('footerText').textContent = texts.footerText || '© 2024 جميع الحقوق محفوظة';
            document.getElementById('cardInstruction').textContent = 'يرجى إدخال رقم الكارت الخاص بك';
            document.getElementById('barcodeInstruction').textContent = 'قم بمسح الباركود باستخدام الكاميرا';
        }
        
        // تحديث طريقة الدخول
        function updateLoginMethod(login) {
            if (!login) return;
            
            const methodTabs = document.getElementById('methodTabs');
            const basicLogin = document.getElementById('basicLogin');
            const cardsLogin = document.getElementById('cardsLogin');
            const barcodeLogin = document.getElementById('barcodeLogin');
            
            if (login.method === 'mixed') {
                // النظام المختلط - إظهار شريط التبديل
                methodTabs.style.display = 'flex';
                
                // تفعيل الأنظمة المختارة
                if (login.mixed && login.mixed.enableUserPass !== false) {
                    showMethod('userpass');
                } else if (login.mixed && login.mixed.enableCards !== false) {
                    showMethod('cards');
                } else if (login.mixed && login.mixed.enableBarcode !== false) {
                    showMethod('barcode');
                } else {
                    // إذا لم يتم تفعيل أي نظام، نعرض اليوزر/باس
                    showMethod('userpass');
                }
                
                // إعداد التبديل بين الأنظمة
                setupMethodTabs(login.mixed);
                
            } else {
                // نظام واحد فقط
                methodTabs.style.display = 'none';
                
                // إخفاء جميع الأشكال أولاً
                basicLogin.classList.remove('show');
                cardsLogin.classList.remove('show');
                barcodeLogin.classList.remove('show');
                
                // إظهار الشكل المناسب
                if (login.method === 'userpass') {
                    basicLogin.classList.add('show');
                } else if (login.method === 'cards') {
                    cardsLogin.classList.add('show');
                } else if (login.method === 'barcode') {
                    barcodeLogin.classList.add('show');
                }
            }
            
            console.log('✅ تم تغيير طريقة الدخول إلى:', login.method);
        }
        
        // إظهار طريقة معينة
        function showMethod(method) {
            const basicLogin = document.getElementById('basicLogin');
            const cardsLogin = document.getElementById('cardsLogin');
            const barcodeLogin = document.getElementById('barcodeLogin');
            const tabs = document.querySelectorAll('.method-tab');
            
            // إخفاء كل الأشكال
            basicLogin.classList.remove('show');
            cardsLogin.classList.remove('show');
            barcodeLogin.classList.remove('show');
            
            // إزالة التفعيل من جميع التبويبات
            tabs.forEach(tab => tab.classList.remove('active'));
            
            // إظهار الشكل المطلوب
            if (method === 'userpass') {
                basicLogin.classList.add('show');
                document.querySelector('.method-tab[data-method="userpass"]').classList.add('active');
                currentMethod = 'userpass';
            } else if (method === 'cards') {
                cardsLogin.classList.add('show');
                document.querySelector('.method-tab[data-method="cards"]').classList.add('active');
                currentMethod = 'cards';
            } else if (method === 'barcode') {
                barcodeLogin.classList.add('show');
                document.querySelector('.method-tab[data-method="barcode"]').classList.add('active');
                currentMethod = 'barcode';
            }
        }
        
        // إعداد تبويبات التبديل بين الأنظمة
        function setupMethodTabs(mixedSettings) {
            const tabs = document.querySelectorAll('.method-tab');
            
            // إزالة جميع المفاتيح السابقة
            tabs.forEach(tab => {
                tab.replaceWith(tab.cloneNode(true));
            });
            
            // إعادة الحصول على التبويبات الجديدة
            const newTabs = document.querySelectorAll('.method-tab');
            
            newTabs.forEach(tab => {
                const method = tab.getAttribute('data-method');
                
                // إخفاء التبويبات غير المفعلة
                if (mixedSettings) {
                    if (method === 'userpass' && mixedSettings.enableUserPass === false) {
                        tab.style.display = 'none';
                    } else if (method === 'cards' && mixedSettings.enableCards === false) {
                        tab.style.display = 'none';
                    } else if (method === 'barcode' && mixedSettings.enableBarcode === false) {
                        tab.style.display = 'none';
                    } else {
                        tab.style.display = 'block';
                    }
                }
                
                // إضافة حدث النقر
                tab.addEventListener('click', function() {
                    if (mixedSettings.allowSwitch !== false) {
                        showMethod(method);
                    }
                });
            });
        }
        
        // الحصول على حجم الشعار
        function getLogoSize(size) {
            switch(size) {
                case 'small': return '20px';
                case 'large': return '28px';
                default: return '24px';
            }
        }
        
        // دالة لتغميق اللون
        function darkenColor(color, percent) {
            const num = parseInt(color.replace("#", ""), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) - amt;
            const G = (num >> 8 & 0x00FF) - amt;
            const B = (num & 0x0000FF) - amt;
            return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
        }
        
        // إظهار رسالة
        function showMessage(text, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = text;
            notification.className = 'notification';
            
            if (type === 'success') {
                notification.style.background = 'rgba(74, 214, 109, 0.2)';
                notification.style.borderColor = '#4ad66d';
            } else if (type === 'error') {
                notification.style.background = 'rgba(247, 37, 133, 0.2)';
                notification.style.borderColor = '#f72585';
            } else {
                notification.style.background = 'rgba(76, 201, 240, 0.2)';
                notification.style.borderColor = '#4cc9f0';
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // دالة الدخول
        function login() {
            const loginMethod = currentMethod;
            
            if (loginMethod === 'userpass') {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                if (!username || !password) {
                    showMessage('يرجى ملء جميع الحقول', 'error');
                    return;
                }
                
                showMessage('جاري تسجيل الدخول...', 'info');
                
                setTimeout(() => {
                    showMessage('تم تسجيل الدخول بنجاح!', 'success');
                }, 1500);
                
            } else if (loginMethod === 'cards') {
                const cardNumber = document.getElementById('cardNumber').value;
                const cleanCardNumber = cardNumber.replace(/\s/g, '');
                
                if (!cleanCardNumber || cleanCardNumber.length < 16) {
                    showMessage('يرجى إدخال رقم كارت صحيح (16 رقم)', 'error');
                    return;
                }
                
                showMessage('جاري التحقق من الكارت...', 'info');
                
                setTimeout(() => {
                    showMessage('تم التحقق من الكارت بنجاح!', 'success');
                }, 1500);
                
            } else if (loginMethod === 'barcode') {
                const barcode = document.getElementById('barcodeInput').value;
                
                if (!barcode) {
                    showMessage('يرجى مسح الباركود أو إدخاله يدوياً', 'error');
                    return;
                }
                
                showMessage('جاري مسح الباركود...', 'info');
                
                setTimeout(() => {
                    showMessage('تم مسح الباركود بنجاح!', 'success');
                }, 1500);
            }
        }
        
        // استقبال الإعدادات من صفحة الإدارة
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'UPDATE_SETTINGS') {
                console.log('🔄 تحديث الإعدادات من الإدارة');
                updateDesign(event.data.settings);
                
                localStorage.setItem('hotspotPreviewSettings', JSON.stringify(event.data.settings));
            }
        });
        
        // تحميل الإعدادات المحفوظة عند البدء
        window.addEventListener('load', function() {
            console.log('🚀 صفحة المعاينة جاهزة');
            
            // تحميل الإعدادات المحفوظة
            const saved = localStorage.getItem('hotspotPreviewSettings');
            if (saved) {
                try {
                    const settings = JSON.parse(saved);
                    updateDesign(settings);
                } catch (e) {
                    console.error('❌ خطأ في تحميل الإعدادات:', e);
                }
            }
            
            // إعداد زر الدخول
            document.getElementById('loginButton').addEventListener('click', login);
            
            // إعداد تنسيق رقم الكارت
            document.getElementById('cardNumber').addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                value = value.substring(0, 16);
                value = value.replace(/(\d{4})/g, '$1 ').trim();
                e.target.value = value;
            });
            
            showMessage('صفحة المعاينة جاهزة للاستخدام', 'success');
        });
        
        // جعل الدوال متاحة عالمياً
        window.updateDesign = updateDesign;
    </script>
    <script src="mikro-access.js?v=20260721-1"></script>
</body>
</html>
