<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Tahoma, Arial, sans-serif;
        }

        .mikro-icons-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            padding: 6px 4px;
            box-sizing: border-box;
        }

        .mikro-social-icons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            order: 1;
        }

        .mikro-help-icon,
        .mikro-social-icon {
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            animation: mikro-float 3s ease-in-out infinite;
        }

        .mikro-social-icon {
            width: clamp(48px, 72vw, 58px);
            height: clamp(48px, 72vw, 58px);
            text-decoration: none;
            font-size: clamp(21px, 34vw, 25px);
        }

        .mikro-help-icon {
            width: clamp(52px, 76vw, 62px);
            height: clamp(52px, 76vw, 62px);
            border: none;
            cursor: pointer;
            font-size: clamp(22px, 36vw, 27px);
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
            position: relative;
            order: 3;
        }

        .mikro-social-icon:nth-child(1) { animation-delay: 0.5s; }
        .mikro-social-icon:nth-child(2) { animation-delay: 1s; }

        @keyframes mikro-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(4deg); }
        }

        .mikro-help-icon:hover,
        .mikro-social-icon:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
        }

        .mikro-whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
        .mikro-facebook { background: linear-gradient(135deg, #1877F2, #0A5BC4); }

        .mikro-help-text {
            position: absolute;
            right: 75px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            color: #1e293b;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border-left: 4px solid #8b5cf6;
        }

        .mikro-help-icon:hover .mikro-help-text { opacity: 1; }

        @media (max-width: 80px), (max-height: 245px) {
            .mikro-icons-wrapper { gap: 8px; padding: 5px 3px; }
            .mikro-social-icons { gap: 8px; }
            .mikro-help-text { display: none; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mikro-icons-wrapper">
        <div class="mikro-social-icons">
            <a href="https://wa.me/201092503391" target="_blank" class="mikro-social-icon mikro-whatsapp" title="واتساب">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://www.facebook.com/share/1CBhsFePt3/?mibextid=wwXIfr" target="_blank" class="mikro-social-icon mikro-facebook" title="فيسبوك">
                <i class="fab fa-facebook-f"></i>
            </a>
        </div>

        <button class="mikro-help-icon" type="button" onclick="openMikroChat()" title="مساعد MikroTools">
            <i class="fas fa-robot"></i>
            <span class="mikro-help-text">مساعد ذكي</span>
        </button>
    </div>

    <script>
        function openMikroChat() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'mikro-open-chat' }, '*');
            } else {
                window.location.href = 'index.html?openChat=1';
            }
        }
    </script>
</body>
</html>
