<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  padding:0;
  background:transparent !important;
  width:100px;
  height:280px;
  overflow:hidden;
}

.mikro-icons-wrapper{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
  justify-content:flex-end;
}

.mikro-help-icon{
  width:65px;
  height:65px;
  border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#10b981);
  color:white;
  border:none;
  cursor:pointer;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 25px rgba(99,102,241,.5);
  transition:all .3s ease;
  animation:mikro-float 3s ease-in-out infinite;
  position:relative;
  order:3;
}

.mikro-social-icons{
  display:flex;
  flex-direction:column;
  gap:15px;
  order:1;
}

.mikro-social-icon{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-decoration:none;
  font-size:26px;
  transition:all .3s ease;
  box-shadow:0 8px 25px rgba(0,0,0,.3);
  animation:mikro-float 3s ease-in-out infinite;
}

.mikro-social-icon:nth-child(1){animation-delay:.5s;}
.mikro-social-icon:nth-child(2){animation-delay:1s;}

@keyframes mikro-float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-10px) rotate(5deg);}
}

.mikro-help-icon:hover,
.mikro-social-icon:hover{
  transform:scale(1.15);
  box-shadow:0 12px 35px rgba(0,0,0,.4);
}

.mikro-whatsapp{
  background:linear-gradient(135deg,#25D366,#128C7E);
}

.mikro-facebook{
  background:linear-gradient(135deg,#1877F2,#0A5BC4);
}

.mikro-help-text{
  position:absolute;
  right:75px;
  top:50%;
  transform:translateY(-50%);
  background:white;
  color:#1e293b;
  padding:10px 18px;
  border-radius:12px;
  font-size:15px;
  font-weight:700;
  white-space:nowrap;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
  opacity:0;
  transition:opacity .3s ease;
  pointer-events:none;
  border-left:4px solid #6366f1;
}

.mikro-help-icon:hover .mikro-help-text{
  opacity:1;
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="mikro-icons-wrapper">

  <div class="mikro-social-icons">
    <a href="https://wa.me/201092503391" target="_blank"
       class="mikro-social-icon mikro-whatsapp"
       title="واتساب">
      <i class="fab fa-whatsapp"></i>
    </a>

    <a href="https://www.facebook.com/share/1CBhsFePt3/?mibextid=wwXIfr" target="_blank"
       class="mikro-social-icon mikro-facebook"
       title="فيسبوك">
      <i class="fab fa-facebook-f"></i>
    </a>
  </div>

  <button class="mikro-help-icon" onclick="showMikroHelp()" title="مساعد الشبكات">
    🤖
    <span class="mikro-help-text">اسأل مساعد الشبكات</span>
  </button>

</div>

<script>
function showMikroHelp() {
  if (window.parent && window.parent.openMikroChatBot) {
    window.parent.openMikroChatBot();
    return;
  }

  if (window.openMikroChatBot) {
    window.openMikroChatBot();
    return;
  }

  window.parent.postMessage('open-mikro-chatbot', '*');
}
</script>

</body>
</html>
